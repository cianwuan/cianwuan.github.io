                <p>次日，<br>
承师就带我去参观了湛山寺。</p>
<!-- more -->
<p>对于湛山寺，我的脑海中少有的印象就是弘一法师来这里讲过法。</p>
<p>走在寺中，空气中是玉兰花香。<br>
人们虔诚的拜佛，烧香。香烟缕缕，就是他们的祈盼吧。</p>
<p>寺院的猫，懒洋洋地晒着太阳，有人过来了，打个哈欠，伸个懒腰。然后继续享受着这轻抚般地阳光。</p>
